{% load static %}
<div
  class="vertical-navigation w-64 bg-white border-r border-gray-200 flex flex-col"
>
  <nav class="flex-1 p-4">
    <ul class="space-y-2">
      <li>
        <a
          class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors bg-indigo-50 text-indigo-700"
          href="{% url 'dashboard' %}"
          data-discover="true"
        >
          <img src="{% static 'images/svgs/dashboard.svg'%}" />
          <span class="font-medium">Dashboard</span>
        </a>
      </li>
      <li>
        <a
          class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-700 hover:bg-gray-100"
          href="{% url 'subscription' %}"
          data-discover="true"
        >
          <img src="{% static 'images/svgs/subscription.svg'%}" />

          <span class="font-medium">Subscriptions</span>
        </a>
      </li>
      <li>
        <a
          class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-700 hover:bg-gray-100"
          href="/groups"
          data-discover="true"
        >
          <img src="{% static 'images/svgs/groups.svg'%}" />

          <span class="font-medium">Groups</span>
        </a>
      </li>
      <li>
        <a
          class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-700 hover:bg-gray-100"
          href="/activity"
          data-discover="true"
        >
          <img src="{% static 'images/svgs/activity.svg'%}" />

          <span class="font-medium">Activity</span>
        </a>
      </li>
      <li>
        <a
          class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-700 hover:bg-gray-100"
          href="/settings"
          data-discover="true"
        >
          <img src="{% static 'images/svgs/setting.svg'%}" />

          <span class="font-medium">Settings</span>
        </a>
      </li>
    </ul>
    <div>
      <form action="{% url 'logout' %}" method="POST" class="space-y-6">
        {% csrf_token %}
        <button
          type="submit"
          class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-1.5 text-sm/6 font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 mt-150"
        >
          Logout
        </button>
      </form>
    </div>
  </nav>
</div>
